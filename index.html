<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Hóa đơn Xăng Dầu - AI Kế Toán Pro</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; color: #333; }
        .container { max-width: 700px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1, h2 { text-align: center; color: #2c3e50; }
        
        .upload-section { background-color: #e8f4f8; padding: 15px; border: 2px dashed #3498db; border-radius: 8px; text-align: center; margin-bottom: 20px; }
        .upload-section input[type="file"] { display: none; }
        .upload-label { background-color: #3498db; color: white; padding: 10px 20px; border-radius: 4px; cursor: pointer; display: inline-block; font-weight: bold; }
        .upload-label:hover { background-color: #2980b9; }
        #scanStatus { margin-top: 10px; font-weight: bold; font-size: 15px; }

        #debugLog { display: none; background: #2c3e50; color: #2ecc71; padding: 15px; border-radius: 5px; font-family: monospace; font-size: 13px; margin-bottom: 20px; max-height: 250px; overflow-y: auto; white-space: pre-wrap; line-height: 1.5; word-break: break-all; }
        .debug-title { color: #f1c40f; font-weight: bold; margin-bottom: 5px; }

        .form-row { display: flex; gap: 15px; margin-bottom: 15px; }
        .form-group { flex: 1; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px;}
        input, select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        
        button { padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; }
        .btn-add { background-color: #f39c12; width: 100%; font-size: 16px; margin-bottom: 20px;}
        .btn-add:hover { background-color: #e67e22; }
        
        .action-buttons { display: flex; gap: 10px; margin-top: 10px; }
        .btn-export { background-color: #27ae60; flex: 1; }
        .btn-export:hover { background-color: #2ecc71; }
        .btn-clear { background-color: #e74c3c; flex: 1; }
        .btn-clear:hover { background-color: #c0392b; }
        .btn-delete-row { background-color: #e74c3c; padding: 5px 10px; font-size: 12px; margin: 0; }
        .btn-delete-row:hover { background-color: #c0392b; }

        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 14px;}
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f2f2f2; }
        .total-row { font-weight: bold; background-color: #ffeaa7; }
        .manual-entry-title { border-top: 2px solid #eee; padding-top: 20px; margin-top: 20px; color: #7f8c8d; font-size: 18px;}
    </style>
</head>
<body>

    <div class="container">
        <h1>Hệ Thống Quản Lý Hóa Đơn</h1>
        
        <div class="upload-section">
            <label for="pdfUpload" class="upload-label">📁 Chọn nhiều Hóa đơn cùng lúc (.PDF)</label>
            <input type="file" id="pdfUpload" accept=".pdf" multiple onchange="handlePDFUpload(event)">
            <div id="scanStatus"></div>
        </div>

        <div id="debugLog"></div>

        <h2 class="manual-entry-title">Hoặc Nhập Thủ Công</h2>
        <div class="form-row">
            <div class="form-group">
                <label for="date">Ngày hóa đơn:</label>
                <input type="date" id="date">
            </div>
            <div class="form-group">
                <label for="fuelType">Loại nhiên liệu:</label>
                <select id="fuelType">
                    <option value="Xăng RON 95">Xăng RON 95</option>
                    <option value="Dầu Điêzen">Dầu Điêzen</option>
                </select>
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label for="amount">Số tiền (VNĐ):</label>
                <input type="number" id="amount" placeholder="VD: 500000">
            </div>
            <div class="form-group">
                <label for="volume">Khối lượng (Lít):</label>
                <input type="number" id="volume" placeholder="VD: 20.5" step="0.01">
            </div>
        </div>

        <button class="btn-add" onclick="addInvoice()">Thêm Thủ Công</button>

        <h2>Bảng Thống Kê</h2>
        <table id="invoiceTable">
            <thead>
                <tr>
                    <th>STT</th>
                    <th>Ngày</th>
                    <th>Nhiên liệu</th>
                    <th>Số Lít</th>
                    <th>Số tiền (VNĐ)</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
            <tfoot>
                <tr class="total-row">
                    <td colspan="4" style="text-align: right;">Tổng cộng:</td>
                    <td id="totalAmount">0</td>
                    <td></td>
                </tr>
            </tfoot>
        </table>

        <p style="font-weight: bold; text-align: right; font-size: 16px;">
            Tổng khối lượng đã đổ: <span id="totalVolume" style="color: #27ae60;">0</span> Lít
        </p>

        <div class="action-buttons">
            <button class="btn-export" onclick="exportToExcel()">Xuất file Excel (CSV)</button>
            <button class="btn-clear" onclick="clearAllData()">Xóa toàn bộ dữ liệu</button>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        
        let invoices = JSON.parse(localStorage.getItem('gasInvoicesData')) || [];
        renderTable();

        function showDebug(title, text) {
            const dbg = document.getElementById('debugLog');
            dbg.style.display = 'block';
            const safeText = text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            dbg.innerHTML += `<div class="debug-title">--- ${title} ---</div>${safeText}<br><br>`;
        }

        async function handlePDFUpload(event) {
            const files = event.target.files;
            if (!files || files.length === 0) return;

            const statusDiv = document.getElementById('scanStatus');
            document.getElementById('debugLog').innerHTML = ''; 
            document.getElementById('debugLog').style.display = 'none';
            
            let successCount = 0;
            let failCount = 0;

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                statusDiv.innerText = `⏳ Đang quét AI: ${file.name} (${i + 1}/${files.length})...`;
                statusDiv.style.color = "#d35400";
                
                let pdf = null; 

                try {
                    const arrayBuffer = await file.arrayBuffer();
                    const typedarray = new Uint8Array(arrayBuffer);
                    
                    const loadingTask = pdfjsLib.getDocument({
                        data: typedarray,
                        cMapUrl: 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/cmaps/',
                        cMapPacked: true,
                        standardFontDataUrl: 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/standard_fonts/'
                    });
                    
                    pdf = await loadingTask.promise;
                    const page = await pdf.getPage(1);
                    const textContent = await page.getTextContent();
                    
                    const fullText = textContent.items.map(item => item.str).join(" ").normalize("NFC").replace(/\s+/g, " ");
                    const textLower = fullText.toLowerCase();

                    let dateVal = "";
                    let typeVal = "Xăng RON 95"; 
                    let amountVal = 0;
                    let volumeVal = 0;

                    // 1. TÌM NGÀY 
                    const dateMatch = textLower.match(/ng[aá]y\D*?(\d{1,2})\D*?th[aá]ng\D*?(\d{1,2})\D*?n[aă]m\D*?(\d{4})/);
                    if (dateMatch) {
                        dateVal = `${dateMatch[3]}-${dateMatch[2].padStart(2, '0')}-${dateMatch[1].padStart(2, '0')}`; 
                    } else {
                        const dateMatch2 = textLower.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);
                        if (dateMatch2) dateVal = `${dateMatch2[3]}-${dateMatch2[2].padStart(2, '0')}-${dateMatch2[1].padStart(2, '0')}`;
                    }

                    // 2. TÌM NHIÊN LIỆU
                    const cleanText = textLower.replace(/xăng dầu/g, "").replace(/dầu khí/g, "");
                    if (cleanText.match(/(điêzen|diezen|diesel|dầudo|dầu do|do 0[,.]05|do 0[,.]001)/)) {
                        typeVal = "Dầu Điêzen";
                    }

                    // 3. TÌM TỔNG TIỀN (Chỉ lấy số có dấu phân cách nghìn, né số điện thoại)
                    const moneyMatches = fullText.match(/\b\d{1,3}(?:[.,]\d{3})+\b/g) || [];
                    let validAmounts = [];
                    
                    for (let m of moneyMatches) {
                        // Bỏ qua đơn giá lẻ (VD: 19.425,93)
                        if (m.includes('.') && m.includes(',')) continue; 
                        validAmounts.push(parseInt(m.replace(/[.,]/g, '')));
                    }

                    if (validAmounts.length > 0) {
                        amountVal = Math.max(...validAmounts);
                    } else {
                        // Kế hoạch dự phòng cho hóa đơn ghi tiền liền mạch đi sau chữ "thanh toán"
                        const flatMoney = fullText.match(/(?:thanh toán|tổng cộng|tổng tiền)\D{0,30}?(\d{5,8})\b/i);
                        if (flatMoney) amountVal = parseInt(flatMoney[1]);
                    }

                    // 4. TÌM SỐ LÍT BẰNG AI TOÁN HỌC
                    let keywordIndex = textLower.indexOf("lít");
                    if (keywordIndex === -1) keywordIndex = textLower.indexOf("lit");
                    if (keywordIndex === -1) keywordIndex = textLower.indexOf("lượng");

                    if (keywordIndex !== -1 && amountVal > 0) {
                        const windowText = fullText.substring(Math.max(0, keywordIndex - 20), keywordIndex + 150);
                        const nums = windowText.match(/\d+(?:[.,]\d+){0,3}/g) || []; 

                        for (let n of nums) {
                            let cleanNum = n;
                            // Đổi phẩy tiếng Việt thành chấm toán học (VD: 45,285 -> 45.285)
                            if (cleanNum.includes('.') && cleanNum.includes(',')) {
                                cleanNum = cleanNum.replace(/\./g, '').replace(',', '.');
                            } else if (cleanNum.includes(',')) {
                                cleanNum = cleanNum.replace(',', '.');
                            }
                            let val = parseFloat(cleanNum);

                            // Lọc số Lít nằm trong giới hạn thực tế của bồn chứa
                            if (val > 0 && val < 5000) {
                                let impliedPrice = amountVal / val;
                                // Kiểm tra chéo: Số Lít x Đơn Giá thị trường (10k-40k) phải khớp với Tổng Tiền
                                if (impliedPrice > 10000 && impliedPrice < 40000) {
                                    volumeVal = val;
                                    break;
                                }
                                // Mở rộng: Đôi khi Tổng Tiền chưa gồm VAT, kiểm tra thêm phép chia giá gốc
                                let impliedPriceNoVAT = (amountVal * 0.92) / val;
                                if (impliedPriceNoVAT > 9000 && impliedPriceNoVAT < 40000) {
                                    volumeVal = val;
                                    break;
                                }
                            }
                        }
                    }

                    // KIỂM ĐỊNH & GHI NHẬN
                    if (dateVal && amountVal && volumeVal) {
                        invoices.push({ date: dateVal, type: typeVal, amount: amountVal, volume: volumeVal });
                        successCount++;
                    } else {
                        failCount++;
                        showDebug(`AI TỪ CHỐI FILE: ${file.name}`, `Ngày: ${dateVal || 'X'}\nTiền: ${amountVal || 'X'}\nLít: ${volumeVal || 'X'}\n\n[DỮ LIỆU ĐƯỢC AI XỬ LÝ]\n${fullText}`);
                    }

                } catch (error) {
                    failCount++;
                    showDebug(`CRASH TẠI FILE: ${file.name}`, error.toString());
                } finally {
                    if (pdf) await pdf.destroy();
                }
            }

            localStorage.setItem('gasInvoicesData', JSON.stringify(invoices));
            renderTable();

            if (failCount === 0) {
                statusDiv.innerText = `✅ Hoàn mỹ! AI đã nhận diện 100% thành công ${successCount} hóa đơn.`;
                statusDiv.style.color = "#27ae60";
            } else {
                statusDiv.innerText = `⚠️ Hoàn tất! Quét được ${successCount} file. Có ${failCount} file bị AI từ chối.`;
                statusDiv.style.color = "#e67e22";
            }
            event.target.value = ''; 
        }

        // --- CÁC HÀM XỬ LÝ GIAO DIỆN (GIỮ NGUYÊN) ---
        function addInvoice() {
            const date = document.getElementById('date').value;
            const fuelType = document.getElementById('fuelType').value;
            const amount = document.getElementById('amount').value;
            const volume = document.getElementById('volume').value;

            if (!date || !amount || !volume) { alert("Vui lòng điền đủ thông tin!"); return; }

            invoices.push({ date: date, type: fuelType, amount: parseInt(amount), volume: parseFloat(volume) });
            localStorage.setItem('gasInvoicesData', JSON.stringify(invoices));
            
            document.getElementById('date').value = ''; document.getElementById('amount').value = ''; document.getElementById('volume').value = '';
            renderTable();
        }

        function deleteInvoice(index) {
            if (confirm("Bạn có chắc chắn muốn xóa hóa đơn này khỏi bảng không?")) {
                invoices.splice(index, 1);
                localStorage.setItem('gasInvoicesData', JSON.stringify(invoices));
                renderTable();
            }
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = ''; 
            let totalAmount = 0, totalVolume = 0;

            invoices.forEach((invoice, index) => {
                totalAmount += invoice.amount; totalVolume += invoice.volume;
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${index + 1}</td> <td>${invoice.date}</td> <td>${invoice.type}</td>
                    <td>${invoice.volume}</td> <td>${invoice.amount.toLocaleString('vi-VN')}</td>
                    <td><button class="btn-delete-row" onclick="deleteInvoice(${index})">Xóa</button></td>
                `;
                tbody.appendChild(row);
            });

            document.getElementById('totalVolume').innerText = totalVolume.toFixed(2);
            document.getElementById('totalAmount').innerText = totalAmount.toLocaleString('vi-VN');
        }

        function clearAllData() {
            if (confirm("⚠️ Bạn có chắc chắn muốn xóa toàn bộ dữ liệu hóa đơn không?")) {
                invoices = []; localStorage.removeItem('gasInvoicesData'); renderTable(); 
            }
        }

        function exportToExcel() {
            if (invoices.length === 0) { alert("Chưa có dữ liệu để xuất!"); return; }
            let csvContent = "STT,Ngày,Loại nhiên liệu,Số Lít,Số tiền (VNĐ)\n";
            invoices.forEach((invoice, index) => { csvContent += `${index + 1},${invoice.date},${invoice.type},${invoice.volume},${invoice.amount}\n`; });
            const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = "thong_ke_xang_dau.csv";
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        }
    </script>
</body>
</html>
